{% extends 'common.html' %}
{% load static %}

{% block content %}

<div class="auth-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="auth-card">
                    <div style="text-align:center;margin-bottom:28px;">
                        <div style="width:64px;height:64px;background:linear-gradient(135deg,#C9622F,#D4A843);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:26px;color:white;box-shadow:0 8px 22px rgba(201,98,47,0.35);">
                            <i class="fas fa-paper-plane"></i>
                        </div>
                        <h2>Forgot Password?</h2>
                        <p class="subtitle">No worries — we'll send you a one-time password to reset it.</p>
                    </div>

                    <form method="POST" action="{% url 'send_otp' %}">
                        {% csrf_token %}
                        <div class="form-group-custom">
                            <label class="form-label-custom">
                                <i class="fas fa-envelope me-1" style="color:var(--primary);"></i> Registered Email Address
                            </label>
                            <input type="email" class="form-input-custom" name="email" placeholder="you@example.com" required>
                        </div>

                        <button type="submit" class="form-submit-btn">
                            <i class="fas fa-paper-plane me-2"></i>Send OTP
                        </button>
                    </form>

                    <div class="form-footer-link">
                        Remembered your password? <a href="{% url 'login1' %}">Log in</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
