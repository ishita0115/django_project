{% extends 'common.html' %}
{% load static %}

{% block content %}

<div class="auth-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="auth-card">
                    <div style="text-align:center;margin-bottom:28px;">
                        <div style="width:64px;height:64px;background:linear-gradient(135deg,#C9622F,#D4A843);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:26px;color:white;box-shadow:0 8px 22px rgba(201,98,47,0.35);">
                            <i class="fas fa-shield-alt"></i>
                        </div>
                        <h2>Enter OTP</h2>
                        <p class="subtitle">We've sent a one-time password to your email. Please enter it below.</p>
                    </div>

                    <form method="POST">
                        {% csrf_token %}
                        <div class="form-group-custom">
                            <label class="form-label-custom">
                                <i class="fas fa-key me-1" style="color:var(--primary);"></i> One-Time Password
                            </label>
                            <input type="text" class="form-input-custom" name="otp" placeholder="Enter 6-digit OTP" maxlength="6" style="letter-spacing:6px;font-size:1.3rem;font-weight:700;text-align:center;" required>
                        </div>

                        <button type="submit" class="form-submit-btn">
                            <i class="fas fa-check-circle me-2"></i>Verify OTP
                        </button>
                    </form>

                    <div class="form-footer-link">
                        Didn't receive it? <a href="{% url 'forgot_pass' %}">Resend OTP</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
