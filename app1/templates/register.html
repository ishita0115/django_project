{% extends 'common.html' %}
{% load static %}

{% block content %}

<div class="auth-page" style="padding:50px 0;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-7">
                <div class="auth-card" style="max-width:620px;">
                    <!-- Header -->
                    <div style="text-align:center;margin-bottom:30px;">
                        <div style="width:64px;height:64px;background:linear-gradient(135deg,#C9622F,#D4A843);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:26px;color:white;box-shadow:0 8px 22px rgba(201,98,47,0.35);">
                            <i class="fas fa-user-plus"></i>
                        </div>
                        <h2>Join ArtShopy</h2>
                        <p class="subtitle">Create your account to start collecting art</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group-custom">
                                    <label class="form-label-custom">
                                        <i class="fas fa-user me-1" style="color:var(--primary);"></i> Full Name
                                    </label>
                                    <input type="text" class="form-input-custom" name="username" placeholder="Your full name" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group-custom">
                                    <label class="form-label-custom">
                                        <i class="fas fa-envelope me-1" style="color:var(--primary);"></i> Email
                                    </label>
                                    <input type="email" class="form-input-custom" name="email" placeholder="you@example.com" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group-custom">
                                    <label class="form-label-custom">
                                        <i class="fas fa-phone me-1" style="color:var(--primary);"></i> Phone Number
                                    </label>
                                    <input type="tel" class="form-input-custom" name="phone" placeholder="+91 00000 00000" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group-custom">
                                    <label class="form-label-custom">
                                        <i class="fas fa-map-marker-alt me-1" style="color:var(--primary);"></i> Delivery Address
                                    </label>
                                    <input type="text" class="form-input-custom" name="Address" placeholder="Your address" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group-custom">
                                    <label class="form-label-custom">
                                        <i class="fas fa-lock me-1" style="color:var(--primary);"></i> Password
                                    </label>
                                    <input type="password" class="form-input-custom" name="psw" id="psw1" placeholder="Create password" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group-custom">
                                    <label class="form-label-custom">
                                        <i class="fas fa-lock me-1" style="color:var(--primary);"></i> Confirm Password
                                    </label>
                                    <input type="password" class="form-input-custom" name="psw-repeat" id="psw2" placeholder="Repeat password" required>
                                </div>
                            </div>
                        </div>

                        <div id="passError" style="display:none;color:#e05a5a;font-size:0.85rem;margin-bottom:12px;padding:10px 14px;background:#fff5f5;border-radius:10px;border-left:4px solid #e05a5a;">
                            <i class="fas fa-exclamation-circle me-1"></i> Passwords do not match.
                        </div>

                        <button type="submit" class="form-submit-btn" onclick="return checkPass()">
                            <i class="fas fa-user-plus me-2"></i>Create My Account
                        </button>
                    </form>

                    <div class="form-footer-link">
                        Already have an account? <a href="{% url 'login1' %}">Sign in here</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% if message %}
<div style="position:fixed;top:90px;right:20px;z-index:9999;">
    <div style="background:#fff;border-left:4px solid #C9622F;border-radius:12px;padding:16px 22px;box-shadow:0 8px 30px rgba(0,0,0,0.14);max-width:320px;">
        <div style="display:flex;align-items:center;gap:10px;">
            <i class="fas fa-info-circle" style="color:#C9622F;font-size:1.2rem;"></i>
            <div>
                <p style="margin:0;font-weight:600;color:#333;font-size:0.9rem;">Notice</p>
                <p style="margin:0;color:#8B7355;font-size:0.83rem;">{{ message }}</p>
            </div>
        </div>
    </div>
</div>
{% endif %}

<script>
function checkPass() {
    const p1 = document.getElementById('psw1').value;
    const p2 = document.getElementById('psw2').value;
    if (p1 !== p2) {
        document.getElementById('passError').style.display = 'block';
        return false;
    }
    return true;
}
</script>

{% endblock %}
